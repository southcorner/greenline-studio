<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Greenline CMS</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0C1210;--surface:#111A16;--surface2:#162019;
  --border:#1E2B24;--accent:#36E08B;--accent-dim:#1F9D63;
  --text:#F4F3EE;--muted:#7A8A80;--danger:#FF6B6B;
  --input:#0A1610;--radius:10px;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;min-height:100vh}

/* ── Login ── */
#login{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:40px;width:100%;max-width:360px}
.login-logo{display:flex;align-items:center;gap:10px;margin-bottom:32px}
.login-logo-mark{width:32px;height:32px;background:var(--accent-dim);border-radius:8px;display:flex;align-items:center;justify-content:center}
.login-logo-mark span{width:18px;height:3px;background:var(--accent);border-radius:2px;display:block}
.login-logo-name{font-size:16px;font-weight:600;letter-spacing:-.02em}
.login-box h1{font-size:20px;font-weight:600;margin-bottom:6px}
.login-box p{color:var(--muted);margin-bottom:24px;font-size:13px}
.login-err{color:var(--danger);font-size:13px;margin-bottom:14px;display:none}

/* ── Shared form ── */
label{display:block;font-size:12px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
input,textarea{width:100%;background:var(--input);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:var(--font);font-size:14px;padding:10px 14px;outline:none;transition:border-color .15s}
input:focus,textarea:focus{border-color:var(--accent-dim)}
textarea{resize:vertical;min-height:80px;line-height:1.55}
.field{margin-bottom:20px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;border:none;transition:opacity .15s}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn-primary{background:var(--accent);color:#0C1210}
.btn-primary:hover:not(:disabled){opacity:.88}
.btn-ghost{background:transparent;color:var(--text);border:1px solid var(--border)}
.btn-ghost:hover:not(:disabled){border-color:var(--muted)}

/* ── CMS Shell ── */
#cms{display:none;min-height:100vh;flex-direction:column}
.cms-header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 28px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.cms-logo{display:flex;align-items:center;gap:10px;font-weight:600;font-size:15px;letter-spacing:-.02em}
.cms-logo-mark{width:26px;height:26px;background:var(--accent-dim);border-radius:6px;display:flex;align-items:center;justify-content:center}
.cms-logo-mark span{width:14px;height:3px;background:var(--accent);border-radius:2px;display:block}
.cms-actions{display:flex;align-items:center;gap:12px}
.status{font-size:13px;color:var(--muted);transition:color .2s}
.status.saving{color:var(--accent)}
.status.done{color:var(--accent)}
.status.err{color:var(--danger)}

/* ── Tabs ── */
.cms-tabs{background:var(--surface);border-bottom:1px solid var(--border);padding:0 28px;display:flex;gap:4px}
.tab{background:none;border:none;color:var(--muted);font-family:var(--font);font-size:14px;font-weight:500;padding:14px 16px;cursor:pointer;border-bottom:2px solid transparent;transition:color .15s,border-color .15s}
.tab.active{color:var(--text);border-bottom-color:var(--accent)}
.tab:hover:not(.active){color:var(--text)}

/* ── Content area ── */
.cms-body{flex:1;padding:32px 28px;max-width:860px;margin:0 auto;width:100%}
.panel{display:none}
.panel.active{display:block}
.section-label{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--accent-dim);margin:32px 0 18px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.section-label:first-child{margin-top:0}

/* ── Spinner ── */
.spinner{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<!-- Login screen -->
<div id="login">
  <div class="login-box">
    <div class="login-logo">
      <div class="login-logo-mark"><span></span></div>
      <span class="login-logo-name">greenline cms</span>
    </div>
    <h1>Sign in</h1>
    <p>Enter your admin password to edit site content.</p>
    <div class="login-err" id="login-err">Incorrect password.</div>
    <form id="login-form">
      <div class="field">
        <label for="pwd">Password</label>
        <input type="password" id="pwd" autocomplete="current-password" placeholder="••••••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary" id="login-btn" style="width:100%;justify-content:center">Sign in</button>
    </form>
  </div>
</div>

<!-- CMS screen -->
<div id="cms">
  <header class="cms-header">
    <div class="cms-logo">
      <div class="cms-logo-mark"><span></span></div>
      greenline cms
    </div>
    <div class="cms-actions">
      <span class="status" id="status"></span>
      <button class="btn btn-primary" id="publish-btn" onclick="publish()">Save &amp; Publish</button>
    </div>
  </header>

  <nav class="cms-tabs">
    <button class="tab active" data-tab="home" onclick="switchTab('home',this)">Home page</button>
    <button class="tab" data-tab="services" onclick="switchTab('services',this)">Services page</button>
  </nav>

  <div class="cms-body">

    <!-- ── HOME TAB ── -->
    <div class="panel active" id="panel-home">

      <div class="section-label">Hero</div>
      <div class="field"><label>Eyebrow label</label><input type="text" data-key="home.hero_eyebrow"></div>
      <div class="field-row">
        <div class="field" style="margin:0"><label>H1 text (before highlight)</label><input type="text" data-key="home.hero_h1_before" placeholder="Commerce, engineered to "></div>
        <div class="field" style="margin:0"><label>H1 highlighted word</label><input type="text" data-key="home.hero_h1_highlight" placeholder="grow."></div>
      </div>
      <div class="field"><label>Sub-headline</label><textarea data-key="home.hero_sub" rows="3"></textarea></div>

      <div class="section-label">Services section (home)</div>
      <div class="field"><label>Section heading</label><input type="text" data-key="home.services_h2"></div>
      <div class="field"><label>Section sub-line</label><textarea data-key="home.services_subline" rows="2"></textarea></div>

      <div class="section-label">Service cards</div>
      <div class="field-row"><div class="field" style="margin:0"><label>Card 1 title</label><input type="text" data-key="home.svc1_title"></div><div class="field" style="margin:0"><label>Card 1 description</label><textarea data-key="home.svc1_desc" rows="3"></textarea></div></div>
      <div class="field-row"><div class="field" style="margin:0"><label>Card 2 title</label><input type="text" data-key="home.svc2_title"></div><div class="field" style="margin:0"><label>Card 2 description</label><textarea data-key="home.svc2_desc" rows="3"></textarea></div></div>
      <div class="field-row"><div class="field" style="margin:0"><label>Card 3 title</label><input type="text" data-key="home.svc3_title"></div><div class="field" style="margin:0"><label>Card 3 description</label><textarea data-key="home.svc3_desc" rows="3"></textarea></div></div>
      <div class="field-row"><div class="field" style="margin:0"><label>Card 4 title</label><input type="text" data-key="home.svc4_title"></div><div class="field" style="margin:0"><label>Card 4 description</label><textarea data-key="home.svc4_desc" rows="3"></textarea></div></div>
      <div class="field-row"><div class="field" style="margin:0"><label>Card 5 title</label><input type="text" data-key="home.svc5_title"></div><div class="field" style="margin:0"><label>Card 5 description</label><textarea data-key="home.svc5_desc" rows="3"></textarea></div></div>
      <div class="field-row"><div class="field" style="margin:0"><label>Card 6 title</label><input type="text" data-key="home.svc6_title"></div><div class="field" style="margin:0"><label>Card 6 description</label><textarea data-key="home.svc6_desc" rows="3"></textarea></div></div>
      <div class="field-row"><div class="field" style="margin:0"><label>Card 7 title</label><input type="text" data-key="home.svc7_title"></div><div class="field" style="margin:0"><label>Card 7 description</label><textarea data-key="home.svc7_desc" rows="3"></textarea></div></div>

      <div class="section-label">Selected work</div>
      <div class="field"><label>Section heading</label><input type="text" data-key="home.work_h2"></div>
      <div class="field-row"><div class="field" style="margin:0"><label>Case study 1 — client</label><input type="text" data-key="home.case1_client"></div><div class="field" style="margin:0"><label>Case study 1 — description</label><textarea data-key="home.case1_desc" rows="3"></textarea></div></div>
      <div class="field-row"><div class="field" style="margin:0"><label>Case study 2 — client</label><input type="text" data-key="home.case2_client"></div><div class="field" style="margin:0"><label>Case study 2 — description</label><textarea data-key="home.case2_desc" rows="3"></textarea></div></div>
      <div class="field-row"><div class="field" style="margin:0"><label>Case study 3 — client</label><input type="text" data-key="home.case3_client"></div><div class="field" style="margin:0"><label>Case study 3 — description</label><textarea data-key="home.case3_desc" rows="3"></textarea></div></div>

      <div class="section-label">Process steps</div>
      <div class="field"><label>Section heading</label><input type="text" data-key="home.process_h2"></div>
      <div class="field-row"><div class="field" style="margin:0"><label>Step 1 title</label><input type="text" data-key="home.proc1_title"></div><div class="field" style="margin:0"><label>Step 1 description</label><textarea data-key="home.proc1_desc" rows="2"></textarea></div></div>
      <div class="field-row"><div class="field" style="margin:0"><label>Step 2 title</label><input type="text" data-key="home.proc2_title"></div><div class="field" style="margin:0"><label>Step 2 description</label><textarea data-key="home.proc2_desc" rows="2"></textarea></div></div>
      <div class="field-row"><div class="field" style="margin:0"><label>Step 3 title</label><input type="text" data-key="home.proc3_title"></div><div class="field" style="margin:0"><label>Step 3 description</label><textarea data-key="home.proc3_desc" rows="2"></textarea></div></div>
      <div class="field-row"><div class="field" style="margin:0"><label>Step 4 title</label><input type="text" data-key="home.proc4_title"></div><div class="field" style="margin:0"><label>Step 4 description</label><textarea data-key="home.proc4_desc" rows="2"></textarea></div></div>

      <div class="section-label">Call to action</div>
      <div class="field"><label>CTA heading</label><input type="text" data-key="home.cta_h2"></div>
      <div class="field"><label>CTA sub-text</label><textarea data-key="home.cta_sub" rows="2"></textarea></div>
    </div>

    <!-- ── SERVICES TAB ── -->
    <div class="panel" id="panel-services">

      <div class="section-label">Page intro</div>
      <div class="field-row">
        <div class="field" style="margin:0"><label>H1 text (before highlight)</label><input type="text" data-key="services.sint_h1_before"></div>
        <div class="field" style="margin:0"><label>H1 highlighted word</label><input type="text" data-key="services.sint_h1_highlight"></div>
      </div>
      <div class="field"><label>Intro paragraph</label><textarea data-key="services.sint_desc" rows="3"></textarea></div>

      <div class="section-label">Service sections</div>
      <div class="field"><label>S1 heading — Web Development</label><input type="text" data-key="services.s1_h2"></div>
      <div class="field"><label>S1 body</label><textarea data-key="services.s1_body" rows="3"></textarea></div>
      <div class="field"><label>S2 heading — Ecommerce Store Building</label><input type="text" data-key="services.s2_h2"></div>
      <div class="field"><label>S2 body</label><textarea data-key="services.s2_body" rows="3"></textarea></div>
      <div class="field"><label>S3 heading — Marketplace Management</label><input type="text" data-key="services.s3_h2"></div>
      <div class="field"><label>S3 body</label><textarea data-key="services.s3_body" rows="3"></textarea></div>
      <div class="field"><label>S4 heading — Digital Marketing</label><input type="text" data-key="services.s4_h2"></div>
      <div class="field"><label>S4 body</label><textarea data-key="services.s4_body" rows="3"></textarea></div>
      <div class="field"><label>S5 heading — Social Media</label><input type="text" data-key="services.s5_h2"></div>
      <div class="field"><label>S5 body</label><textarea data-key="services.s5_body" rows="3"></textarea></div>
      <div class="field"><label>S6 heading — Product Design</label><input type="text" data-key="services.s6_h2"></div>
      <div class="field"><label>S6 body</label><textarea data-key="services.s6_body" rows="3"></textarea></div>
      <div class="field"><label>S7 heading — Branding</label><input type="text" data-key="services.s7_h2"></div>
      <div class="field"><label>S7 body</label><textarea data-key="services.s7_body" rows="3"></textarea></div>

      <div class="section-label">Pricing tiers</div>
      <div class="field"><label>Section heading</label><input type="text" data-key="services.pricing_h2"></div>
      <div class="field-row"><div class="field" style="margin:0"><label>Tier 1 name</label><input type="text" data-key="services.tier1_name"></div><div class="field" style="margin:0"><label>Tier 1 description</label><textarea data-key="services.tier1_desc" rows="2"></textarea></div></div>
      <div class="field-row"><div class="field" style="margin:0"><label>Tier 2 name</label><input type="text" data-key="services.tier2_name"></div><div class="field" style="margin:0"><label>Tier 2 description</label><textarea data-key="services.tier2_desc" rows="2"></textarea></div></div>
      <div class="field-row"><div class="field" style="margin:0"><label>Tier 3 name</label><input type="text" data-key="services.tier3_name"></div><div class="field" style="margin:0"><label>Tier 3 description</label><textarea data-key="services.tier3_desc" rows="2"></textarea></div></div>

      <div class="section-label">Call to action</div>
      <div class="field"><label>CTA heading</label><input type="text" data-key="services.cta_h2"></div>
      <div class="field"><label>CTA sub-text</label><textarea data-key="services.cta_sub" rows="2"></textarea></div>
    </div>

  </div><!-- /cms-body -->
</div><!-- /cms -->

<script>
let _sha = null;

// ── Helpers ───────────────────────────────────────────────────────────────────
function setStatus(msg, cls) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status ' + (cls || '');
  if (cls === 'done') setTimeout(() => { if (el.textContent === msg) el.textContent = ''; }, 6000);
}

function getVal(key) {
  const el = document.querySelector(`[data-key="${key}"]`);
  return el ? el.value : '';
}
function setVal(key, val) {
  const el = document.querySelector(`[data-key="${key}"]`);
  if (el) el.value = val || '';
}

// ── Tab switching ─────────────────────────────────────────────────────────────
function switchTab(tab, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('panel-' + tab).classList.add('active');
}

// ── Populate fields from content object ───────────────────────────────────────
function populate(content) {
  for (const [page, fields] of Object.entries(content)) {
    for (const [key, val] of Object.entries(fields)) {
      setVal(`${page}.${key}`, val);
    }
  }
}

// ── Collect fields into content object ────────────────────────────────────────
function collect() {
  const content = { home: {}, services: {} };
  document.querySelectorAll('[data-key]').forEach(el => {
    const [page, ...rest] = el.getAttribute('data-key').split('.');
    const key = rest.join('.');
    if (content[page]) content[page][key] = el.value;
  });
  return content;
}

// ── Load content from API ─────────────────────────────────────────────────────
async function loadContent() {
  try {
    const res = await fetch('/admin/api/load');
    if (res.status === 401) { showLogin(); return; }
    if (!res.ok) throw new Error('Load failed');
    const { content, sha } = await res.json();
    _sha = sha;
    populate(content);
    showCms();
  } catch (e) {
    setStatus('Failed to load content — ' + e.message, 'err');
  }
}

// ── Publish ───────────────────────────────────────────────────────────────────
async function publish() {
  const btn = document.getElementById('publish-btn');
  btn.disabled = true;
  setStatus('Saving…', 'saving');
  try {
    const res = await fetch('/admin/api/save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ content: collect(), sha: _sha }),
    });
    const data = await res.json();
    if (res.status === 409) {
      setStatus('Conflict — reload the page and try again.', 'err');
      return;
    }
    if (!res.ok) throw new Error(data.detail || data.error || 'Save failed');
    _sha = data.commit || _sha;
    setStatus('Published — live in ~60s', 'done');
  } catch (e) {
    setStatus('Error: ' + e.message, 'err');
  } finally {
    btn.disabled = false;
  }
}

// ── Login ─────────────────────────────────────────────────────────────────────
document.getElementById('login-form').addEventListener('submit', async e => {
  e.preventDefault();
  const btn = document.getElementById('login-btn');
  const err = document.getElementById('login-err');
  btn.disabled = true;
  btn.textContent = 'Signing in…';
  err.style.display = 'none';
  try {
    const res = await fetch('/admin/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: document.getElementById('pwd').value }),
    });
    if (!res.ok) { err.style.display = 'block'; return; }
    await loadContent();
  } catch {
    err.textContent = 'Network error. Try again.';
    err.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Sign in';
  }
});

function showLogin() {
  document.getElementById('login').style.display = 'flex';
  document.getElementById('cms').style.display = 'none';
}
function showCms() {
  document.getElementById('login').style.display = 'none';
  document.getElementById('cms').style.display = 'flex';
}

// ── Init ──────────────────────────────────────────────────────────────────────
loadContent();
</script>
</body>
</html>
