    (function(){
      var k='gl-nav-ts';
      var ts=sessionStorage.getItem(k);
      if(ts&&(Date.now()-parseInt(ts,10))<8000){
        var t=document.getElementById('__bundler_thumbnail');
        var l=document.getElementById('__bundler_loading');
        if(t){t.style.transition='opacity .18s';t.style.opacity='0';setTimeout(function(){t.style.display='none';},200);}
        if(l)l.style.display='none';
        sessionStorage.removeItem(k);
      }
      document.addEventListener('click',function(e){
        var a=e.target.closest('a');
        if(!a)return;
        var href=a.getAttribute('href');
        if(!href||href.charAt(0)==='#'||/^(mailto|tel|http|\/\/)/.test(href))return;
        sessionStorage.setItem(k,Date.now().toString());
      },true);
    })();

    (function(){
      var prefetched = {};
      document.addEventListener('mouseover', function(e) {

        if (!a) return;

        if (!href || href.charAt(0) === '#' || /^(mailto|tel|http|\/\/)/.test(href)) return;
        if (prefetched[href]) return;
        prefetched[href] = true;
        var link = document.createElement('link');

        link.href = href;

  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ut your brand and what you need, we’ll reply within one business day.<\u002Fp>\n      <\u002Fdiv>\n      <form id=\"gl-book-form\" novalidate=\"\" style=\"padding:26px 32px 32px; display:flex; flex-direction:column; gap:17px;\">\n        <div class=\"gl-form-2\" style=\"display:grid; grid-template-columns:1fr 1fr; gap:14px;\">\n          <div>\n            <label class=\"gl-flabel\">Brand name <span style=\"color:#1F9D63;\">*<\u002Fspan><\u002Flabel>\n            <input class=\"gl-input\" name=\"brand\" required=\"\" placeholder=\"e.g. Harbor Goods\">\n          <\u002Fdiv>\n          <div>\n            <label class=\"gl-flabel\">Registered name <span class=\"gl-opt\">· optional<\u002Fspan><\u002Flabel>\n            <input class=\"gl-input\" name=\"company\" placeholder=\"Legal entity name\">\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <label class=\"gl-flabel\">Requirement <span style=\"color:#1F9D63;\">*<\u002Fspan><\u002Flabel>\n          <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:9px;\">\n            <label class=\"gl-chk\"><input type=\"checkbox\" name=\"requirement\" value=\"Web Development\"><span class=\"gl-chk-box\">Web Development<\u002Fspan><\u002Flabel>\n            <label class=\"gl-chk\"><input type=\"checkbox\" name=\"requirement\" value=\"Store Building\"><span class=\"gl-chk-box\">Store Building<\u002Fspan><\u002Flabel>\n            <label class=\"gl-chk\"><input type=\"checkbox\" name=\"requirement\" value=\"Marketplaces\"><span class=\"gl-chk-box\">Marketplaces<\u002Fspan><\u002Flabel>\n            <label class=\"gl-chk\"><input type=\"checkbox\" name=\"requirement\" value=\"Digital Marketing\"><span class=\"gl-chk-box\">Digital Marketing<\u002Fspan><\u002Flabel>\n            <label class=\"gl-chk\"><input type=\"checkbox\" name=\"requirement\" value=\"Social Media\"><span class=\"gl-chk-box\">Social Media<\u002Fspan><\u002Flabel>\n            <label class=\"gl-chk\"><input type=\"checkbox\" name=\"requirement\" value=\"Product Design\"><span class=\"gl-chk-box\">Product Design<\u002Fspan><\u002Flabel>\n            <label class=\"gl-chk\" style=\"grid-column:1 / -1;\"><input type=\"checkbox\" name=\"requirement\" value=\"Branding\"><span class=\"gl-chk-box\">Branding<\u002Fspan><\u002Flabel>\n          <\u002Fdiv>\n          <p data-req-error=\"\" style=\"display:none; font-size:12.5px; color:#C0492F; margin-top:8px;\">Pick at least one service.<\u002Fp>\n        <\u002Fdiv>\n        <div>\n          <label class=\"gl-flabel\">Platforms <span class=\"gl-opt\">· optional<\u002Fspan><\u002Flabel>\n          <input class=\"gl-input\" name=\"platforms\" placeholder=\"Shopify, Amazon, Instagram…\">\n        <\u002Fdiv>\n        <div>\n          <label class=\"gl-flabel\">Contact name <span style=\"color:#1F9D63;\">*<\u002Fspan><\u002Flabel>\n          <input class=\"gl-input\" name=\"contact\" required=\"\" placeholder=\"Your full name\">\n        <\u002Fdiv>\n        <div class=\"gl-form-2\" style=\"display:grid; grid-template-columns:1fr 1fr; gap:14px;\">\n          <div>\n            <label class=\"gl-flabel\">Email <span style=\"color:#1F9D63;\">*<\u002Fspan><\u002Flabel>\n            <input class=\"gl-input\" type=\"email\" name=\"email\" required=\"\" placeholder=\"you@brand.com\">\n          <\u002Fdiv>\n          <div>\n            <label class=\"gl-flabel\">Mobile <span class=\"gl-opt\">· optional<\u002Fspan><\u002Flabel>\n            <input class=\"gl-input\" type=\"tel\" name=\"mobile\" placeholder=\"+1 555 000 0000\">\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <button type=\"submit\" class=\"gl-btn-primary\" style=\"margin-top:4px; font-weight:500; font-size:15px; color:#0C1210; background:#36E08B; border:none; border-radius:11px; padding:14px 24px; cursor:pointer; transition:background .25s, transform .25s; display:flex; align-items:center; justify-content:center; gap:9px;\">Request call <span style=\"width:18px; height:2px; background:#0C1210; display:inline-block;\"><\u002Fspan><\u002Fbutton>\n        <p style=\"font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:.06em; color:#9AA09B; text-align:center;\">NO SPAM · ONE REPLY · ONE BUSINESS DAY<\u002Fp>\n      <\u002Fform>\n      <div data-book-success=\"\" style=\"display:none; padding:54px 32px 58px; text-align:center;\">\n        <div style=\"width:66px; height:66px; border-radius:50%; background:#E6EFE8; display:flex; align-items:center; justify-content:center; margin:0 auto 22px;\">\n          <svg width=\"30\" height=\"30\" viewBox=\"0 0 32 32\" fill=\"none\" stroke=\"#1F9D63\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M7 17 L13 23 L25 9\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n        <h3 style=\"font-weight:500; font-size:24px; letter-spacing:-.02em;\">Request received.<\u002Fh3>\n        <p style=\"font-weight:300; font-size:15px; color:#4A4F4C; margin-top:10px; max-width:340px; margin-left:auto; margin-right:auto;\">Thanks, we’ll be in touch within one business day to lock a time.<\u002Fp>\n        <button type=\"button\" data-book-close=\"\" class=\"gl-btn-primary\" style=\"margin-top:26px; font-weight:500; font-size:14.5px; color:#0C1210; background:#36E08B; border:none; border-radius:10px; padding:12px 28px; cursor:pointer; transition:background .25s, transform .25s;\">Done<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:900},&quot;email&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;studio@greenline.studio&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;animate&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;}}\">\nclass Component extends DCLogic {\n  renderVals() {\n    return {\n      email: this.props.email ?? \"studio@greenline.studio\",\n    };\n  }\n\n  componentDidMount() {\n    const root = document.getElementById(\"gl-home\");\n    if (!root) return;\n    const animate = this.props.animate ?? true;\n\n    // NAV solidify on scroll\n    const nav = document.getElementById(\"gl-nav\");\n    const onNav = () => {\n      if (window.scrollY > 40) {\n        nav.style.background = \"rgba(244,243,238,.55)\";\n        nav.style.backdropFilter = \"saturate(180%) blur(22px)\";\n        nav.style.webkitBackdropFilter = \"saturate(180%) blur(22px)\";\n        nav.style.borderBottomColor = \"rgba(255,255,255,.55)\";\n        nav.style.boxShadow = \"0 10px 30px -14px rgba(15,59,44,.22), inset 0 1px 0 rgba(255,255,255,.7)\";\n      } else {\n        nav.style.background = \"transparent\";\n        nav.style.backdropFilter = \"none\";\n        nav.style.webkitBackdropFilter = \"none\";\n        nav.style.borderBottomColor = \"transparent\";\n        nav.style.boxShadow = \"none\";\n      }\n    };\n    onNav();\n    window.addEventListener(\"scroll\", onNav, { passive: true });\n\n    // Scroll reveals\n    const reveals = [...root.querySelectorAll(\"[data-reveal]\")];\n    const counts = [...root.querySelectorAll(\"[data-count]\")];\n    const lines = [...root.querySelectorAll(\"[data-line]\")];\n\n    const showEl = (el) => {\n      if (el.__shown) return;\n      el.__shown = true;\n      const sibs = [...el.parentElement.querySelectorAll(\":scope > [data-reveal]\")];\n      el.style.transitionDelay = (Math.max(0, sibs.indexOf(el)) * 70) + \"ms\";\n      el.style.opacity = \"1\";\n      el.style.transform = \"none\";\n    };\n\n    if (!animate) {\n      reveals.forEach((el) => { el.style.opacity = \"1\"; el.style.transform = \"none\"; });\n      counts.forEach((c) => this._count(c));\n      lines.forEach((l) => (l.style.width = \"88%\"));\n      return;\n    }\n\n    // 1) commit hidden state WITHOUT a transition\n    reveals.forEach((el) => {\n      el.style.transition = \"none\";\n      el.style.opacity = \"0\";\n      el.style.transform = \"translateY(28px)\";\n      el.style.willChange = \"opacity, transform\";\n    });\n    void document.body.offsetHeight; // force reflow so hidden frame is committed\n\n    const check = () => {\n      const vh = window.innerHeight;\n      reveals.forEach((el) => { if (!el.__shown && el.getBoundingClientRect().top < vh * 0.92) showEl(el); });\n      counts.forEach((c) => { if (!c.__counted && c.getBoundingClientRect().top < vh * 0.9) this._count(c); });\n      lines.forEach((l) => { if (!l.__lined && l.getBoundingClientRect().top < vh * 0.9) { l.__lined = true; l.style.width = \"88%\"; } });\n    };\n\n    // 2) next frame: enable transition, then reveal on the following frame\n    requestAnimationFrame(() => {\n      reveals.forEach((el) => {\n        el.style.transition = \"opacity .8s cubic-bezier(.22,.61,.36,1), transform .8s cubic-bezier(.22,.61,.36,1)\";\n      });\n      requestAnimationFrame(check);\n    });\n    window.addEventListener(\"scroll\", check, { passive: true });\n    window.addEventListener(\"resize\", check, { passive: true });\n    window.addEventListener(\"load\", check);\n    setTimeout(check, 450);\n    setTimeout(() => {\n      reveals.forEach(showEl);\n      counts.forEach((c) => this._count(c));\n      lines.forEach((l) => { l.__lined = true; l.style.width = \"88%\"; });\n    }, 1300);\n\n    // Parallax\n    const px = [...root.querySelectorAll(\"[data-parallax]\")];\n    const onScroll = () => {\n      const vh = window.innerHeight;\n      px.forEach((el) => {\n        const r = el.getBoundingClientRect();\n        const center = r.top + r.height / 2;\n        const off = (center - vh / 2) / vh; // -1..1\n        const speed = parseFloat(el.getAttribute(\"data-speed\")) || 0;\n        el.style.transform = \"translate3d(0,\" + (off * speed * 100).toFixed(1) + \"px,0)\";\n      });\n    };\n    if (animate) {\n      onScroll();\n      window.addEventListener(\"scroll\", onScroll, { passive: true });\n      window.addEventListener(\"resize\", onScroll, { passive: true });\n    }\n\n    this._initMobileNav();\n    this._initBooking(root);\n  }\n\n  _initMobileNav() {\n    const burger = document.getElementById(\"gl-burger\");\n    const menu = document.getElementById(\"gl-mobile-menu\");\n    if (!burger || !menu) return;\n    let open = false;\n    const spans = burger.querySelectorAll(\"span\");\n    const set = (o) => {\n      open = o;\n      menu.style.display = o ? \"flex\" : \"none\";\n      if (spans.length === 3) {\n        spans[0].style.transform = o ? \"translateY(7px) rotate(45deg)\" : \"none\";\n        spans[1].style.opacity = o ? \"0\" : \"1\";\n        spans[2].style.transform = o ? \"translateY(-7px) rotate(-45deg)\" : \"none\";\n      }\n    };\n    burger.addEventListener(\"click\", () => set(!open));\n    menu.querySelectorAll(\"a\").forEach((a) => a.addEventListener(\"click\", () => set(false)));\n    window.addEventListener(\"resize\", () => { if (window.innerWidth > 880) set(false); });\n  }\n\n  _initBooking(root) {\n    const bModal = document.getElementById(\"gl-book-modal\");\n    const bPanel = document.getElementById(\"gl-book-panel\");\n    const bForm = document.getElementById(\"gl-book-form\");\n    const bSuccess = bModal ? bModal.querySelector(\"[data-book-success]\") : null;\n    if (!bModal || !bForm) return;\n    let lastFocus = null;\n    const openB = (e) => {\n      if (e) e.preventDefault();\n      lastFocus = document.activeElement;\n      bModal.style.display = \"flex\";\n      document.body.style.overflow = \"hidden\";\n      requestAnimationFrame(() => { bPanel.style.opacity = \"1\"; bPanel.style.transform = \"none\"; });\n      const first = bForm.querySelector(\"input\");\n      if (first) setTimeout(() => first.focus(), 80);\n    };\n    const closeB = () => {\n      bPanel.style.opacity = \"0\";\n      bPanel.style.transform = \"translateY(14px) scale(.98)\";\n      document.body.style.overflow = \"\";\n      setTimeout(() => {\n        bModal.style.display = \"none\";\n        bForm.reset();\n        bForm.style.display = \"flex\";\n        if (bSuccess) bSuccess.style.display = \"none\";\n        const er = bForm.querySelector(\"[data-req-error]\");\n        if (er) er.style.display = \"none\";\n      }, 260);\n      if (lastFocus && lastFocus.focus) lastFocus.focus();\n    };\n    root.querySelectorAll(\".gl-book\").forEach((b) => b.addEventListener(\"click\", openB));\n    bModal.querySelectorAll(\"[data-book-close]\").forEach((b) => b.addEventListener(\"click\", closeB));\n    bModal.addEventListener(\"mousedown\", (e) => { if (e.target === bModal) closeB(); });\n    document.addEventListener(\"keydown\", (e) => { if (e.key === \"Escape\" && bModal.style.display === \"flex\") closeB(); });\n    bForm.querySelectorAll('input[name=\"requirement\"]').forEach((c) => c.addEventListener(\"change\", () => {\n      const er = bForm.querySelector(\"[data-req-error]\");\n      if (er) er.style.display = \"none\";\n    }));\n    bForm.addEventListener(\"submit\", async (e) => {\n      e.preventDefault();\n      let ok = true;\n      bForm.querySelectorAll(\"input[required]\").forEach((inp) => {\n        if (!inp.value.trim() || (inp.type === \"email\" && !/.+@.+\\..+/.test(inp.value))) {\n          ok = false; inp.style.borderColor = \"#C0492F\";\n        } else { inp.style.borderColor = \"\"; }\n      });\n      const checked = bForm.querySelectorAll('input[name=\"requirement\"]:checked').length;\n      const er = bForm.querySelector(\"[data-req-error]\");\n      if (checked === 0) { if (er) er.style.display = \"block\"; ok = false; }\n      else if (er) er.style.display = \"none\";\n      if (!ok) return;\n      const _btn = bForm.querySelector('button[type=\"submit\"]');\n      const _label = _btn ? _btn.innerHTML : \"\";\n      if (_btn) { _btn.disabled = true; _btn.style.opacity = \"0.6\"; _btn.innerHTML = \"Sending…\"; }\n      try {\n        const fd = new FormData(bForm);\n        fd.append(\"access_key\", \"a62b7648-2556-4ccb-bdbc-964816910070\");\n        fd.append(\"subject\", \"New booking request, greenlinestudio.in\");\n        fd.append(\"from_name\", \"greenline website\");\n        const res = await fetch(\"https://api.web3forms.com/submit\", { method: \"POST\", body: fd });\n        const data = await res.json();\n        if (!data.success) throw new Error(data.message || \"failed\");\n        bForm.style.display = \"none\";\n        if (bSuccess) bSuccess.style.display = \"block\";\n      } catch (err) {\n        if (er) { er.textContent = \"Couldn’t send just now, please email studio@greenline.studio.\"; er.style.display = \"block\"; }\n        if (_btn) { _btn.disabled = false; _btn.style.opacity = \"\"; _btn.innerHTML = _label; }\n      }\n    });\n  }\n\n  _count(el) {\n    if (el.__counted) return;\n    el.__counted = true;\n    const target = parseFloat(el.getAttribute(\"data-count\"));\n    if (isNaN(target)) return;\n    const dec = parseInt(el.getAttribute(\"data-decimals\") || \"0\", 10);\n    const pre = el.getAttribute(\"data-prefix\") || \"\";\n    const suf = el.getAttribute(\"data-suffix\") || \"\";\n    const dur = 1300;\n    const start = performance.now();\n    const ease = (t) => 1 - Math.pow(1 - t, 3);\n    const tick = (now) => {\n      const p = Math.min(1, (now - start) / dur);\n      const v = (target * ease(p)).toFixed(dec);\n      el.textContent = pre + v + suf;\n      if (p < 1) requestAnimationFrame(tick);\n      else el.textContent = pre + target.toFixed(dec) + suf;\n    };\n    requestAnimationFrame(tick);\n  }\n}\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
</script>
